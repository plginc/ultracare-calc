const Mail = (props) => <IconBase {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></IconBase>;
const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
const Copy = (props) => <IconBase {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconBase>;

const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;
const Lock = (props) => <IconBase {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconBase>;
const Loader2 = (props) => <IconBase {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56" /></IconBase>;
const Phone = (props) => <IconBase {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconBase>;
const Calendar = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>;
const Toast = ({ message, onClose }) => (
<div className="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 animate-in slide-in-from-bottom-5 fade-in duration-300 z-[100]">
<CheckCircle className="w-5 h-5 text-green-400" />
<span className="font-medium">{message}</span>
</div>
);
const LeadCaptureModal = ({ isOpen, onClose, onSubmit, isProcessing }) => {
const [name, setName] = useState('');
const [email, setEmail] = useState('');
if (!isOpen) return null;
const handleSubmit = (e) => {
e.preventDefault();
if (name && email) {
onSubmit({ name, email });
}
};
return (
<div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 backdrop-blur-sm p-4">
<div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 animate-in zoom-in-95 duration-200 relative overflow-hidden">
<button
onClick={onClose}
className="absolute top-4 right-4 text-slate-500 hover:text-slate-700 hover:bg-slate-100 p-2 rounded-full transition-colors z-20"
>
<X className="w-6 h-6" />
</button>
<div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-indigo-600"></div>
<div className="mb-6 text-center">
<div className="bg-indigo-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4">
<Lock className="w-6 h-6 text-indigo-600" />
</div>
<h3 className="text-2xl font-bold text-slate-900 mb-2">Unlock Strategic Analysis</h3>
<p className="text-slate-600 text-sm">
Enter your details to generate the full AI-powered executive summary and have this scenario emailed to you.
</p>
</div>
<form onSubmit={handleSubmit} className="space-y-4">
<div>
<label className="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
<input
type="text" required placeholder="John Doe"
className="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none"
value={name} onChange={(e) => setName(e.target.value)}
/>
</div>
<div>
<label className="block text-xs font-bold text-slate-500 uppercase mb-1">Work Email</label>
<input
type="email" required placeholder="john@dealership.com"
className="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none"
value={email} onChange={(e) => setEmail(e.target.value)}
/>
</div>
<button
type="submit"
disabled={isProcessing}
className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-98 flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
>
{isProcessing ? (
<><div className="animate-spin"><Loader2 className="w-4 h-4" /></div> Generating Report...</>
) : (
<><Sparkles className="w-4 h-4" /> Generate Report</>
)}
</button>
<p className="text-[10px] text-center text-slate-400 mt-4">
By continuing, you agree to receive communications about UltraCare. Your data is secure.
</p>
</form>
</div>
</div>
);
};
const EmailModal = ({ isOpen, onClose, url, onCopySuccess }) => {
const [email, setEmail] = useState('');
if (!isOpen) return null;
const handleSend = () => {
const subject = encodeURIComponent("UltraCare ROI Scenario");
const body = encodeURIComponent(`Here is the UltraCare ROI scenario we built:\n\n${url}\n\nLet me know what you think!`);
window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
onClose();
};
const handleCopy = () => {
const textArea = document.createElement("textarea");
textArea.value = url;
textArea.style.position = "fixed";
document.body.appendChild(textArea);
textArea.focus();
textArea.select();
try {
const successful = document.execCommand('copy');
if (successful) { if (onCopySuccess) onCopySuccess(); else alert("Link copied!"); } else { prompt("Copy this link manually:", url); }
} catch (err) { console.error("Copy failed", err); prompt("Copy this link manually:", url); }
document.body.removeChild(textArea);
};
return (
<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm p-4">
<div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 animate-in zoom-in-95 duration-200">
<div className="flex justify-between items-center mb-4">
<h3 className="text-xl font-bold text-slate-800">Email Scenario</h3>
<button onClick={onClose} className="p-1 hover:bg-slate-100 rounded-full transition-colors"><X className="w-5 h-5 text-slate-500" /></button>
</div>
<p className="text-slate-600 mb-4 text-sm">Enter an email address to send this profit scenario link directly to your inbox.</p>
<div className="space-y-4">
<div><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Recipient Email</label><input type="email" placeholder="name@dealership.com" className="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" value={email} onChange={(e) => setEmail(e.target.value)}/></div>
<button onClick={handleSend} disabled={!email} className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-all"><Mail className="w-4 h-4" /> Send Email</button>
<div className="relative flex py-2 items-center"><div className="flex-grow border-t border-slate-200"></div><span className="flex-shrink mx-4 text-slate-400 text-xs">OR</span><div className="flex-grow border-t border-slate-200"></div></div>
<div className="bg-slate-50 p-3 rounded-lg flex items-center justify-between border border-slate-200"><div className="text-xs text-slate-500 truncate max-w-[200px] font-mono">{url}</div><button onClick={handleCopy} className="text-blue-600 text-xs font-bold hover:underline flex items-center gap-1"><Copy className="w-3 h-3" /> Copy Link</button></div>
</div>
</div>
</div>
);
};
function App() {
const [inputs, setInputs] = useState({
monthlySales: 150,
salesPenetration: 20,
monthlyServiceROs: 1200,
servicePenetration: 10,
subPrice: 199,
upsellPerVisit: 178,
visitsPerYear: 2.3,
renewalRate: 70,
utilizationRate: 65,
grossMargin: 55
});
const [metrics, setMetrics] = useState({
y1Profit: 0,
y2Profit: 0,
y3Profit: 0,
y1Rev: 0,
y2Rev: 0,
y3Rev: 0,
totalSubsY3: 0,
y1Subs: 0
});
const [showReport, setShowReport] = useState(false);
const [isLeadModalOpen, setIsLeadModalOpen] = useState(false);
const [isEmailModalOpen, setIsEmailModalOpen] = useState(false);
const [isProcessingReport, setIsProcessingReport] = useState(false);
const [toastMessage, setToastMessage] = useState(null);
const [userData, setUserData] = useState(null);
const [demoRequested, setDemoRequested] = useState(false);
const reportRef = useRef(null);
const [geminiAnalysis, setGeminiAnalysis] = useState(null);
const [isGeminiLoading, setIsGeminiLoading] = useState(false);
const AVG_VEHICLE_GROSS_PROFIT = 2200;
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzHIKVw1HKvMQ5F1oV8EeP11R50t1RCIOuZVrL_uhm9r3NSolu1RqwWjyVgRd33Ejh/exec";
useEffect(() => {
const params = new URLSearchParams(window.location.search);
if ([...params].length > 0) {
const newInputs = { ...inputs };
let hasChanges = false;
for (const [key, value] of params) {
if (newInputs.hasOwnProperty(key)) { newInputs[key] = parseFloat(value); hasChanges = true; }
}
if (hasChanges) setInputs(newInputs);
}
}, []);
useEffect(() => {
const monthlyNewSalesSubs = inputs.monthlySales * (inputs.salesPenetration / 100);
const monthlyNewServiceSubs = inputs.monthlyServiceROs * (inputs.servicePenetration / 100);
const annualNewSubs = (monthlyNewSalesSubs + monthlyNewServiceSubs) * 12;
const y1Active = annualNewSubs;
const y2Active = annualNewSubs + (y1Active * (inputs.renewalRate / 100));
const y3Active = annualNewSubs + (y2Active * (inputs.renewalRate / 100));
const subRevenuePerUser = inputs.subPrice;
const upsellRevenuePerUser = inputs.visitsPerYear * inputs.upsellPerVisit;
const totalRevPerUser = subRevenuePerUser + upsellRevenuePerUser;
const forfeitureProfit = subRevenuePerUser * (1 - (inputs.utilizationRate / 100));
const utilizedSubRevenue = subRevenuePerUser * (inputs.utilizationRate / 100);
const utilizedSubProfit = utilizedSubRevenue * (inputs.grossMargin / 100);
const upsellProfit = upsellRevenuePerUser * (inputs.grossMargin / 100);
const totalProfitPerUser = forfeitureProfit + utilizedSubProfit + upsellProfit;
setMetrics({
y1Profit: y1Active * totalProfitPerUser,
y2Profit: y2Active * totalProfitPerUser,
y3Profit: y3Active * totalProfitPerUser,
y1Rev: y1Active * totalRevPerUser,
y2Rev: y2Active * totalRevPerUser,
y3Rev: y3Active * totalRevPerUser,
totalSubsY3: y3Active,
y1Subs: annualNewSubs
});
}, [inputs]);
const handleChange = (e) => {
const { name, value } = e.target;
setInputs(prev => ({ ...prev, [name]: parseFloat(value) }));
setShowReport(false);
setGeminiAnalysis(null);
setDemoRequested(false);
};
const getShareUrl = () => {
const params = new URLSearchParams(inputs).toString();
const baseUrl = window.location.href.split('?')[0];
return `${baseUrl}?${params}`;
};
const handleGenerateReportClick = () => {
setIsLeadModalOpen(true);
};
const handleEmailClick = () => setIsEmailModalOpen(true);
const callGeminiProxy = async (promptText) => {
if (GOOGLE_SCRIPT_URL) {
const payload = { action: "analyze", prompt: promptText };
try {
const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
const json = await response.json();
return json.text || "Analysis unavailable.";
} catch(e) {
console.error("AI Error", e);
return "Analysis currently unavailable.";
}
}
return "Server connection required for AI.";
};
const getAIAnalysisText = async () => {
const monthlyProfitY1 = metrics.y1Profit / 12;
const costOfWaiting = monthlyProfitY1 * 3;
const futureSalesProfit = (metrics.totalSubsY3 * 0.74) * AVG_VEHICLE_GROSS_PROFIT;
const percentGrowth = ((metrics.y3Profit - metrics.y1Profit) / metrics.y1Profit * 100).toFixed(0);
const totalServiceVisits = Math.round(metrics.totalSubsY3 * inputs.visitsPerYear);
const upsellProfitPotential = totalServiceVisits * inputs.upsellPerVisit * (inputs.grossMargin / 100);
const prompt = `
Generate an Executive Summary for the UltraCare Subscription Maintenance ROI Report.
ROLE & PERSONA: Senior automotive fixed ops consultant. Tone: Authoritative but Consultative. No "guarantees".
DATA:
- Y1 GP: ${formatCurrency(metrics.y1Profit)}, Y3 GP: ${formatCurrency(metrics.y3Profit)}, Growth: ${percentGrowth}%
- Active Subs Y3: ${formatNumber(metrics.totalSubsY3)}
- Projected Service Visits Y3: ${formatNumber(totalServiceVisits)}
- Upsell Profit Potential: ${formatCurrency(upsellProfitPotential)} (at $${inputs.upsellPerVisit} upsell, ${inputs.grossMargin}% margin)
- Forfeiture: ${formatCurrency((inputs.subPrice * (1 - inputs.utilizationRate/100)) * metrics.totalSubsY3)}
- Cost of Inaction: ${formatCurrency(costOfWaiting)}
STRUCTURE (3 Paragraphs):
1. Financial Outlook: "Financial Outlook: ". Discuss projected profit growth.
2. Operational Impact: "Operational Impact: ". Discuss the ${formatNumber(totalServiceVisits)} annual service visits. Mention that based on user input of $${inputs.upsellPerVisit} avg upsell and ${inputs.grossMargin}% margin, this represents approx ${formatCurrency(upsellProfitPotential)} in potential upsell profit. Emphasize service lane stability.
3. Strategic Value: "Strategic Value: ". Connect to dealership value. Mention Forfeiture as secondary benefit.
Formatting: Double line breaks. No intro headers.`;
const aiResult = await callGeminiProxy(prompt);
const introText = `The retention landscape has shifted significantly. Recent data from Cox Automotive (2025) shows that only 54% of owners with vehicles two years old or newer are returning to the selling dealer for service-down from 72% just a couple years ago. That steep 25% drop represents real revenue walking out the door: lost oil changes today, but more importantly, lost major repairs and lost trade cycles tomorrow.
The key insight here is timing. If a customer doesn't establish a service relationship during their first few visits, they rarely come back. The aftermarket captures them, and the dealership loses both the immediate service revenue and the long-term sales opportunity.
UltraCare addresses this vulnerability by extending your retention reach beyond the showroom floor. Whether finalized in the finance office or presented by a service advisor, the program preemptively locks in the customer relationship before competitors can sway their decision. This approach transforms single transactions into a predictable, recurring relationship, ensuring that revenue stays within your dealership regardless of where the customer starts.`;
const caseStudyText = `\n\nCase Study: Lockhart Cadillac's results show what's possible when a dealership commits to this strategy. Since launching their subscription maintenance program in 2021, they've seen remarkable growth:
<ul style="list-style-type: disc; margin-left: 20px; margin-top: 10px; margin-bottom: 10px;">
<li style="margin-bottom: 5px;"><strong>Customer Pay Repair Orders:</strong> Up 83% (from 7,800 to 14,300 in 2025)</li>
<li style="margin-bottom: 5px;"><strong>Customer Pay Revenue:</strong> Up 110% (from $1.47M to $3.1M over the same period)</li>
</ul>\n\nWhat makes this sustainable? Their recent monthly performance tells the story-145 new subscribers alongside 369 automatic renewals, generating $238,796 in revenue. That 2.5:1 ratio of renewals to new subscribers means their growth compounds over time rather than requiring constant new customer acquisition. The automatic renewal engine keeps revenue flowing with minimal ongoing effort.`;
let combinedReport = introText + "\n\n" + aiResult;
if (combinedReport.includes("Strategic Value:")) {
combinedReport = combinedReport.replace("Strategic Value:", caseStudyText + "\n\nStrategic Value:");
} else {
combinedReport = combinedReport + "\n\n" + caseStudyText;
}
return combinedReport;
};
const handleLeadSubmit = async (data) => {
setUserData(data);
setIsProcessingReport(true);
let aiText = "";
try {
aiText = await getAIAnalysisText();
const cleanResult = aiText.replace(/\\(?=\$)/g, "");
setGeminiAnalysis(cleanResult);
aiText = cleanResult;
} catch (err) { console.error("AI Gen failed", err); aiText = "Analysis pending..."; }
setIsProcessingReport(false);
setIsLeadModalOpen(false);
setShowReport(true);
setTimeout(() => reportRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
if (GOOGLE_SCRIPT_URL) {
const monthlyProfitY1 = metrics.y1Profit / 12;
const costOfWaiting = monthlyProfitY1 * 3;
const futureSalesProfit = (metrics.totalSubsY3 * 0.74) * AVG_VEHICLE_GROSS_PROFIT;
const payload = { ...data, inputs: inputs, metrics: metrics, shareUrl: getShareUrl(), aiSummary: aiText, derived: { costOfWaiting: costOfWaiting, futureSalesProfit: futureSalesProfit, forfeitureIncome: (inputs.subPrice * (1 - inputs.utilizationRate/100)) * metrics.totalSubsY3, serviceProfit: ((inputs.subPrice * (inputs.utilizationRate/100)) * (inputs.grossMargin/100)) * metrics.totalSubsY3, upsellProfit: (inputs.visitsPerYear * inputs.upsellPerVisit * (inputs.grossMargin/100)) * metrics.totalSubsY3 }, timestamp: new Date().toISOString() };
fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) }).catch(err => console.error("Error sending data:", err));
}
};
const handleRequestDemo = () => {
if (!userData) return;
setDemoRequested(true);
if (GOOGLE_SCRIPT_URL) {
const payload = { ...userData, action: "request_demo", timestamp: new Date().toISOString() };
fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) }).catch(err => console.error("Error sending demo request:", err));
}
